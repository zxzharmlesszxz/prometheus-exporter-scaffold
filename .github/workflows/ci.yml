name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  render-check:
    name: Render Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: template/go.mod
          cache: true
          cache-dependency-path: template/go.sum

      - name: Check render script syntax
        run: bash -n scripts/render.sh

      - name: Render demo exporter
        run: |
          tmp="$(mktemp -d)"
          echo "RENDERED_EXPORTER=$tmp" >> "$GITHUB_ENV"

          scripts/render.sh \
            --project-name prometheus-demo-exporter \
            --module github.com/zxzharmlesszxz/prometheus-demo-exporter \
            --description "Prometheus Demo Exporter" \
            --feature-name demo \
            --namespace demo_exporter \
            --port 9888 \
            --target-dir "$tmp"

      - name: Run generated Go checks
        run: |
          cd "$RENDERED_EXPORTER"
          go mod tidy
          make go-check GO=go GOFMT=gofmt

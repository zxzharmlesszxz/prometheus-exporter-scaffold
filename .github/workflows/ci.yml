name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  render-check:
    name: Render Check
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine

    steps:
      - name: Prepare Alpine
        run: apk add --no-cache bash build-base ca-certificates git make

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run scaffold checks
        run: make check GO=go GOFMT=gofmt
